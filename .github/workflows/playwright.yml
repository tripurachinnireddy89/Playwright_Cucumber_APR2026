name: Playwright Cucumber Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Tests
      run: npm test
      env:
        USER: ${{ secrets.USER }}
        PASS: ${{ secrets.PASS }}
        URL: ${{ secrets.URL }}
        HEADLESS: ${{ secrets.HEADLESS }}

    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-report
        path: reports/